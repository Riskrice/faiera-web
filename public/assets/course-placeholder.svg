<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Course placeholder</title>
  <desc id="desc">Fallback image used when a course thumbnail is missing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="55%" stop-color="#134e4a" />
      <stop offset="100%" stop-color="#0b1020" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.12" />
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)" />
  <circle cx="1040" cy="120" r="210" fill="url(#accent)" />
  <circle cx="120" cy="710" r="260" fill="url(#accent)" />

  <g fill="none" stroke="#ffffff" stroke-opacity="0.15">
    <rect x="120" y="120" width="960" height="560" rx="44" stroke-width="2" />
    <rect x="160" y="180" width="420" height="28" rx="14" fill="#ffffff" fill-opacity="0.16" stroke="none" />
    <rect x="160" y="230" width="320" height="28" rx="14" fill="#ffffff" fill-opacity="0.11" stroke="none" />
    <rect x="160" y="302" width="260" height="24" rx="12" fill="#22d3ee" fill-opacity="0.35" stroke="none" />
    <rect x="160" y="356" width="880" height="220" rx="24" fill="#000000" fill-opacity="0.2" stroke="none" />
  </g>

  <text x="160" y="458" fill="#e2e8f0" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="700">FAIERA</text>
  <text x="160" y="518" fill="#d1d5db" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="500">Course Image Not Available Yet</text>
</svg>